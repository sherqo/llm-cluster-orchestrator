syntax = "proto3";

package generated;

option go_package = "/master/generated/";

service WorkerService {
  rpc Handle (Request) returns (Response);
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {}

message PingResponse {
  string status = 1;
}

message Request {
  string request_id = 1;
  string message = 2;
  int32 priority = 3;
}

message Response {
  string request_id = 1;
  string reply = 2;
  int32 queue_length = 3;
  int32 retries = 4;
}